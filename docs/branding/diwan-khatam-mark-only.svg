<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="Diwan — khatam mark">
  <title>Diwan — khatam mark (standalone)</title>

  <!--
    Standalone khatam mark, scaled for favicon / app icon use.
    Same construction as docs/branding/diwan-khatam.svg, just
    without the wordmark below — for use where the mark
