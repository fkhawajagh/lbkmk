  -->

  <g fill="none" stroke="#1a3a5c" stroke-width="6" stroke-linejoin="round">
    <polygon points="160,40 280,160 160,280 40,160" />
    <polygon points="244.85,75.15 244.85,244.85 75.15,244.85 75.15,75.15" />
  </g>
</svg>
