<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 696 260" role="img" aria-label="DIWAN — Kufic-Latin wordmark">
  <title>DIWAN — Kufic-Latin wordmark</title>

  <!--
    Concept 4: Latin "DIWAN" rendered with Kufic conventions —
    rectilinear, monoweight, square-cell, no curves. One concession
    to readability: the N gets its defining diagonal (a parallelogram
    stroke), since a pure rectilinear N is indistinguishable from
    a pi-shape and breaks legibility.

    Each letter sits in a 100×140 cell. Stroke weight is 18 units.
    Cells are spaced 24 units apart. Color: #1a3a5c (ink-navy),
    matching the other concepts in this directory.

    Reads as: monumental, archival, carved-in-stone. Closest visual
    cousins are early Quranic Kufic on stone inscriptions and modern
    "square Kufic" used in architecture.
  -->

  <g fill="#1a3a5c">

    <!-- D — translate to x=50, y=60 -->
    <g transform="translate(50, 60)">
      <rect x="0"  y="0"   width="18" height="140"/>  <!-- left vertical -->
      <rect x="0"  y="0"   width="80" height="18"/>   <!-- top arm -->
      <rect x="0"  y="122" width="80" height="18"/>   <!-- bottom arm -->
      <rect x="80" y="18"  width="18" height="104"/>  <!-- right vertical, recessed -->
    </g>

    <!-- I — translate to x=174, y=60 -->
    <g transform="translate(174, 60)">
      <rect x="20" y="0"   width="60" height="18"/>   <!-- top serif -->
      <rect x="41" y="0"   width="18" height="140"/>  <!-- vertical bar -->
      <rect x="20" y="122" width="60" height="18"/>   <!-- bottom serif -->
    </g>

    <!-- W — translate to x=298, y=60. Two V-shapes joined at the top by
         shared baseline; each V is two verticals with a connecting bottom. -->
    <g transform="translate(298, 60)">
      <rect x="0"  y="0"   width="18" height="122"/>  <!-- V1 outer left -->
      <rect x="26" y="0"   width="18" height="122"/>  <!-- V1 inner right -->
      <rect x="0"  y="104" width="44" height="18"/>   <!-- V1 bottom -->
      <rect x="56" y="0"   width="18" height="122"/>  <!-- V2 inner left -->
      <rect x="82" y="0"   width="18" height="122"/>  <!-- V2 outer right -->
      <rect x="56" y="104" width="44" height="18"/>   <!-- V2 bottom -->
    </g>

    <!-- A — translate to x=422, y=60. Inverted-U with a middle crossbar
         (Kufic style — a square-cell apex). -->
    <g transform="translate(422, 60)">
      <rect x="0"  y="0"   width="100" height="18"/>  <!-- top horizontal -->
      <rect x="0"  y="0"   width="18"  height="140"/> <!-- left vertical -->
      <rect x="82" y="0"   width="18"  height="140"/> <!-- right vertical -->
      <rect x="18" y="70"  width="64"  height="18"/>  <!-- crossbar -->
    </g>

    <!-- N — translate to x=546, y=60. Two verticals + a thick diagonal
         parallelogram. The diagonal is the one Kufic concession;
         without it, N is unreadable. -->
    <g transform="translate(546, 60)">
      <rect x="0"  y="0" width="18" height="140"/>   <!-- left vertical -->
      <rect x="82" y="0" width="18" height="140"/>   <!-- right vertical -->
      <polygon points="18,0 38,0 82,140 62,140"/>    <!-- diagonal stroke -->
    </g>

  </g>
</svg>
