<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (typeof mermaid === "undefined") return;
    mermaid.initialize({
      startOnLoad: true,
      theme: "base",
      themeVariables: {
        background: "#FAF7F2",
        primaryColor: "#FAF7F2",
        primaryTextColor: "#2A2522",
        primaryBorderColor: "#C95F3F",
        lineColor: "#6B6157",
        secondaryColor: "#F2EDE3",
        tertiaryColor: "#EAD4B2",
        fontFamily: "Newsreader, Georgia, serif",
        fontSize: "15px"
      },
      flowchart: { curve: "basis", htmlLabels: true, padding: 16 },
      sequence:  { actorMargin: 60, messageMargin: 36, mirrorActors: false, wrap: true },
      er:        { entityPadding: 18, useMaxWidth: true },
      state:     { padding: 14 }
    });
  });
</script>
