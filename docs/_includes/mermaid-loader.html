<link rel="stylesheet" href="https://fonts.bunny.net/css?family=plus-jakarta-sans:400,500,600,700,800|public-sans:400,400i,500,500i,600,600i,700|ibm-plex-mono:400,500|fraunces:500,600&display=swap">
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (typeof mermaid === "undefined") return;
    mermaid.initialize({
      startOnLoad: true,
      theme: "base",
      themeVariables: {
        background: "#FAF7F2",
        primaryColor: "#FAF7F2",
        primaryTextColor: "#2A2522",
        primaryBorderColor: "#C95F3F",
        lineColor: "#6B6157",
        secondaryColor: "#F2EDE3",
        tertiaryColor: "#EAD4B2",
        fontFamily: "Public Sans, Helvetica Neue, system-ui, sans-serif",
        fontSize: "14px"
      },
      flowchart: { curve: "basis", htmlLabels: true, padding: 16 },
      sequence:  { actorMargin: 60, messageMargin: 36, mirrorActors: false, wrap: true },
      er:        { entityPadding: 18, useMaxWidth: true },
      state:     { padding: 14 }
    });
  });
</script>
