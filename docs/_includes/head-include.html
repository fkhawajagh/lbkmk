<link rel="stylesheet" href="https://fonts.bunny.net/css?family=plus-jakarta-sans:400,500,600,700,800|public-sans:400,400i,500,500i,600,600i,700|ibm-plex-mono:400,500|fraunces:500,600&display=swap">
<style>
  /* Sticky top nav (only present in the combined file) */
  .lbk-topnav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(26, 27, 38, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid #292E42;
    padding: 0.55rem 1.25rem;
    margin: 0 -1.5rem 2rem -1.5rem;
    display: flex;
    gap: 1.5rem;
    align-items: center;
    font-family: "Plus Jakarta Sans", system-ui, sans-serif;
  }
  .lbk-topnav__link {
    display: inline-flex;
    align-items: baseline;
    gap: 0.5rem;
    padding: 0.35rem 0.6rem;
    color: #A9B1D6;
    text-decoration: none !important;
    background: none !important;
    border-radius: 4px;
    transition: color 200ms ease, background 200ms ease;
    font-size: 0.95rem;
    font-weight: 500;
  }
  .lbk-topnav__link .lbk-topnav__num {
    font-family: "Fraunces", Georgia, serif;
    color: #7AA2F7;
    font-feature-settings: "tnum" 1, "onum" 1;
    font-style: italic;
    font-size: 0.9em;
  }
  .lbk-topnav__link:hover {
    color: #C0CAF5;
    background: rgba(122, 162, 247, 0.08) !important;
  }
  .lbk-topnav__link.is-active {
    color: #C0CAF5;
    background: rgba(122, 162, 247, 0.12) !important;
  }
  .lbk-topnav__link.is-active .lbk-topnav__num {
    color: #BB9AF7;
  }
  /* When the nav is present, push the page heading down a touch so it
     doesn't tuck under the bar. */
  .lbk-topnav + h1 { margin-top: 1.5rem; }

  /* Part containers: only one is visible at a time. */
  .lbk-part { display: none; }
  .lbk-part.is-active { display: block; }
  /* When a TOC link points into a hidden part, the LI is collapsed so the
     sidebar reflects whichever document is currently on screen. */
  #TOC li.is-hidden-part,
  .sidebar li.is-hidden-part,
  nav li.is-hidden-part { display: none !important; }

  /* Quarto's TOC wraps sub-headings in Bootstrap's .collapse, which is
     hidden by default and only gets .show added when its section is the
     scroll-spy target. In the combined doc one entire half of the DOM
     is display:none, which breaks scroll-spy and leaves one sub-list
     stuck collapsed. Force all TOC sub-lists open. */
  #TOC ul.collapse,
  .sidebar ul.collapse,
  nav.toc-active ul.collapse {
    display: block !important;
    height: auto !important;
    visibility: visible !important;
  }


  /* Diagram frame */
  .diagram {
    background-color: #1F2335;
    border: 1px solid #292E42;
    border-radius: 4px;
    padding: 1.5rem 1.5rem 1.25rem 1.5rem;
    margin: 2rem 0;
    overflow-x: auto;
    position: relative;
    cursor: zoom-in;
    transition: border-color 200ms ease, box-shadow 200ms ease;
  }
  .diagram::before {
    content: "";
    position: absolute;
    top: 0; left: 1.5rem; right: 1.5rem; height: 1px;
    background: linear-gradient(to right, transparent, #7AA2F7 50%, transparent);
    opacity: 0.45;
  }
  .diagram:hover {
    border-color: #7AA2F7;
    box-shadow: 0 0 0 1px rgba(122, 162, 247, 0.15);
  }
  .diagram::after {
    content: "click to zoom";
    position: absolute;
    bottom: 0.4rem;
    right: 0.6rem;
    font-family: "Public Sans", system-ui, sans-serif;
    font-size: 0.7rem;
    color: #565F89;
    pointer-events: none;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .diagram img,
  .diagram svg {
    display: block;
    margin: 0 auto;
    max-width: 100%;
    height: auto;
  }

  /* Zoom modal */
  dialog#lbk-zoom {
    background: #1A1B26;
    color: #C0CAF5;
    border: 1px solid #292E42;
    border-radius: 8px;
    padding: 0;
    max-width: 95vw;
    max-height: 95vh;
    width: 95vw;
    height: 95vh;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
  }
  dialog#lbk-zoom::backdrop {
    background: rgba(10, 11, 20, 0.78);
    backdrop-filter: blur(4px);
  }
  dialog#lbk-zoom .lbk-zoom__close {
    position: absolute;
    top: 0.5rem;
    right: 0.75rem;
    background: transparent;
    border: 1px solid #292E42;
    color: #C0CAF5;
    width: 2rem; height: 2rem;
    line-height: 1;
    font-size: 1.25rem;
    border-radius: 4px;
    cursor: pointer;
    z-index: 10;
    transition: background 150ms ease, border-color 150ms ease;
  }
  dialog#lbk-zoom .lbk-zoom__close:hover {
    background: #292E42;
    border-color: #7AA2F7;
  }
  dialog#lbk-zoom .lbk-zoom__inner {
    width: 100%;
    height: 100%;
    overflow: auto;
    padding: 2.5rem 2rem 2rem 2rem;
    box-sizing: border-box;
    /* Centered when the diagram fits, scrollable when it doesn't.
       text-align centers inline-block children horizontally;
       margin-auto centers the inner wrapper vertically when smaller. */
    text-align: center;
  }
  dialog#lbk-zoom .lbk-zoom__inner svg,
  dialog#lbk-zoom .lbk-zoom__inner img {
    display: inline-block;
    vertical-align: top;
    max-width: none;
  }
  /* Tokyo-Night-coloured scrollbars on the zoom modal */
  dialog#lbk-zoom .lbk-zoom__inner::-webkit-scrollbar {
    width: 12px;
    height: 12px;
  }
  dialog#lbk-zoom .lbk-zoom__inner::-webkit-scrollbar-track {
    background: #1A1B26;
  }
  dialog#lbk-zoom .lbk-zoom__inner::-webkit-scrollbar-thumb {
    background: #292E42;
    border-radius: 6px;
    border: 2px solid #1A1B26;
  }
  dialog#lbk-zoom .lbk-zoom__inner::-webkit-scrollbar-thumb:hover {
    background: #7AA2F7;
  }
</style>
<script>
  (function () {
    function makeDialog() {
      var existing = document.getElementById('lbk-zoom');
      if (existing) return existing;

      var dlg = document.createElement('dialog');
      dlg.id = 'lbk-zoom';

      var closeBtn = document.createElement('button');
      closeBtn.type = 'button';
      closeBtn.className = 'lbk-zoom__close';
      closeBtn.setAttribute('aria-label', 'Close');
      closeBtn.textContent = '×';
      closeBtn.addEventListener('click', function () { dlg.close(); });

      var inner = document.createElement('div');
      inner.className = 'lbk-zoom__inner';

      dlg.appendChild(closeBtn);
      dlg.appendChild(inner);
      document.body.appendChild(dlg);

      dlg.addEventListener('click', function (e) {
        if (!inner.contains(e.target) && e.target !== closeBtn) {
          dlg.close();
        }
      });
      return dlg;
    }

    function openZoom(source) {
      var dlg = makeDialog();
      var inner = dlg.querySelector('.lbk-zoom__inner');
      while (inner.firstChild) inner.removeChild(inner.firstChild);
      var clone = source.cloneNode(true);

      // Scale up by 1.5x. For <img>, multiply rendered width/height.
      // For inline <svg>, use viewBox.
      if (source.tagName === 'IMG') {
        var rect = source.getBoundingClientRect();
        clone.style.width = (rect.width * 1.5) + 'px';
        clone.style.height = (rect.height * 1.5) + 'px';
      } else {
        var vb = clone.getAttribute('viewBox');
        if (vb) {
          var parts = vb.split(/\s+/).map(parseFloat);
          if (parts.length === 4) {
            var w = parts[2], h = parts[3];
            clone.style.width = (w * 1.5) + 'px';
            clone.style.height = (h * 1.5) + 'px';
            clone.removeAttribute('width');
            clone.removeAttribute('height');
          }
        }
      }
      inner.appendChild(clone);
      dlg.showModal();
    }

    function attach() {
      var diagrams = document.querySelectorAll('.diagram');
      for (var i = 0; i < diagrams.length; i++) {
        (function (d) {
          d.addEventListener('click', function () {
            var source = d.querySelector('img') || d.querySelector('svg');
            if (source) openZoom(source);
          });
        })(diagrams[i]);
      }
    }

    function attachNav() {
      var links = document.querySelectorAll('.lbk-topnav__link');
      if (!links.length) return;
      var parts = [];
      for (var i = 0; i < links.length; i++) {
        var link = links[i];
        var el = document.getElementById(link.getAttribute('data-target'));
        if (el) parts.push({ link: link, el: el });
      }
      if (!parts.length) return;

      // Collect every TOC link in the sidebar/secondary-nav once. For each,
      // record which part its anchor target lives in so we can hide/show the
      // matching LI when the active part changes.
      function tocLinks() {
        return document.querySelectorAll(
          '#TOC a[href^="#"], .sidebar a[href^="#"], nav.toc-active a[href^="#"], .quarto-secondary-nav a[href^="#"]'
        );
      }
      function partOf(el) {
        while (el && el !== document.body) {
          if (el.classList && el.classList.contains('lbk-part')) return el.id;
          el = el.parentElement;
        }
        return null;
      }
      var tocIndex = (function () {
        var entries = [];
        var seen = tocLinks();
        for (var i = 0; i < seen.length; i++) {
          var a = seen[i];
          var href = a.getAttribute('href') || '';
          if (!href || href.charAt(0) !== '#' || href.length < 2) continue;
          var tgt = document.getElementById(href.slice(1));
          if (!tgt) continue;
          var p = partOf(tgt);
          if (!p) continue;
          entries.push({ li: a.closest('li') || a, part: p });
        }
        return entries;
      })();

      function activate(partId) {
        for (var i = 0; i < parts.length; i++) {
          var match = (parts[i].el.id === partId);
          parts[i].el.classList.toggle('is-active', match);
          parts[i].link.classList.toggle('is-active', match);
        }
        for (var j = 0; j < tocIndex.length; j++) {
          var entry = tocIndex[j];
          entry.li.classList.toggle('is-hidden-part', entry.part !== partId);
        }
        // Reflect the choice in the URL but don't scroll the page.
        try { history.replaceState(null, '', '#' + partId); } catch (_) {}
        window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
      }

      for (var k = 0; k < parts.length; k++) {
        (function (p) {
          p.link.addEventListener('click', function (e) {
            e.preventDefault();
            activate(p.el.id);
          });
        })(parts[k]);
      }

      // Initial state: URL hash wins, otherwise default to the first part
      // (which already has .is-active from the markdown).
      var initial = parts[0].el.id;
      var hash = window.location.hash ? window.location.hash.slice(1) : '';
      for (var n = 0; n < parts.length; n++) {
        if (parts[n].el.id === hash) initial = hash;
      }
      activate(initial);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () {
        attach();
        attachNav();
      });
    } else {
      attach();
      attachNav();
    }
  })();
</script>
