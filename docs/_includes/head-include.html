<link rel="stylesheet" href="https://fonts.bunny.net/css?family=plus-jakarta-sans:400,500,600,700,800|public-sans:400,400i,500,500i,600,600i,700|ibm-plex-mono:400,500|fraunces:500,600&display=swap">
<style>
  /* Diagram frame */
  .diagram {
    background-color: #1F2335;
    border: 1px solid #292E42;
    border-radius: 4px;
    padding: 1.5rem 1.5rem 1.25rem 1.5rem;
    margin: 2rem 0;
    overflow-x: auto;
    position: relative;
    cursor: zoom-in;
    transition: border-color 200ms ease, box-shadow 200ms ease;
  }
  .diagram::before {
    content: "";
    position: absolute;
    top: 0; left: 1.5rem; right: 1.5rem; height: 1px;
    background: linear-gradient(to right, transparent, #7AA2F7 50%, transparent);
    opacity: 0.45;
  }
  .diagram:hover {
    border-color: #7AA2F7;
    box-shadow: 0 0 0 1px rgba(122, 162, 247, 0.15);
  }
  .diagram::after {
    content: "click to zoom";
    position: absolute;
    bottom: 0.4rem;
    right: 0.6rem;
    font-family: "Public Sans", system-ui, sans-serif;
    font-size: 0.7rem;
    color: #565F89;
    pointer-events: none;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .diagram svg {
    display: block;
    margin: 0 auto;
    max-width: 100%;
    height: auto;
  }

  /* Zoom modal */
  dialog#lbk-zoom {
    background: #1A1B26;
    color: #C0CAF5;
    border: 1px solid #292E42;
    border-radius: 8px;
    padding: 0;
    max-width: 95vw;
    max-height: 95vh;
    width: 95vw;
    height: 95vh;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
  }
  dialog#lbk-zoom::backdrop {
    background: rgba(10, 11, 20, 0.78);
    backdrop-filter: blur(4px);
  }
  dialog#lbk-zoom .lbk-zoom__close {
    position: absolute;
    top: 0.5rem;
    right: 0.75rem;
    background: transparent;
    border: 1px solid #292E42;
    color: #C0CAF5;
    width: 2rem; height: 2rem;
    line-height: 1;
    font-size: 1.25rem;
    border-radius: 4px;
    cursor: pointer;
    z-index: 10;
    transition: background 150ms ease, border-color 150ms ease;
  }
  dialog#lbk-zoom .lbk-zoom__close:hover {
    background: #292E42;
    border-color: #7AA2F7;
  }
  dialog#lbk-zoom .lbk-zoom__inner {
    width: 100%;
    height: 100%;
    overflow: auto;
    padding: 2.5rem 2rem 2rem 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  dialog#lbk-zoom .lbk-zoom__inner svg {
    display: block;
    width: auto;
    height: auto;
    max-width: none;
  }
</style>
<script>
  (function () {
    function makeDialog() {
      var existing = document.getElementById('lbk-zoom');
      if (existing) return existing;

      var dlg = document.createElement('dialog');
      dlg.id = 'lbk-zoom';

      var closeBtn = document.createElement('button');
      closeBtn.type = 'button';
      closeBtn.className = 'lbk-zoom__close';
      closeBtn.setAttribute('aria-label', 'Close');
      closeBtn.textContent = '×';
      closeBtn.addEventListener('click', function () { dlg.close(); });

      var inner = document.createElement('div');
      inner.className = 'lbk-zoom__inner';

      dlg.appendChild(closeBtn);
      dlg.appendChild(inner);
      document.body.appendChild(dlg);

      dlg.addEventListener('click', function (e) {
        if (!inner.contains(e.target) && e.target !== closeBtn) {
          dlg.close();
        }
      });
      return dlg;
    }

    function openZoom(svg) {
      var dlg = makeDialog();
      var inner = dlg.querySelector('.lbk-zoom__inner');
      while (inner.firstChild) inner.removeChild(inner.firstChild);
      var clone = svg.cloneNode(true);

      var vb = clone.getAttribute('viewBox');
      if (vb) {
        var parts = vb.split(/\s+/).map(parseFloat);
        if (parts.length === 4) {
          var w = parts[2], h = parts[3];
          clone.style.width = (w * 1.5) + 'px';
          clone.style.height = (h * 1.5) + 'px';
          clone.removeAttribute('width');
          clone.removeAttribute('height');
        }
      }
      inner.appendChild(clone);
      dlg.showModal();
    }

    function attach() {
      var diagrams = document.querySelectorAll('.diagram');
      for (var i = 0; i < diagrams.length; i++) {
        (function (d) {
          d.addEventListener('click', function () {
            var svg = d.querySelector('svg');
            if (svg) openZoom(svg);
          });
        })(diagrams[i]);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', attach);
    } else {
      attach();
    }
  })();
</script>
